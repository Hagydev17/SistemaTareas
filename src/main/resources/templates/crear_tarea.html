<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Nueva Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body {
        background-color: #fcfcfd;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .navbar-custom {
        background: #111827; /* Gris oscuro minimalista */
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .card-custom {
        border: 1px solid #e5e7eb;
        background-color: #ffffff;
    } </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
    <div class="container"><a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
             class="bi bi-check2-square text-primary" viewBox="0 0 16 16">
            <path d="M3 14.5A1.5 1.5 0 0 1 1.5 13V3A1.5 1.5 0 0 1 3 1.5h8a.5.5 0 0 1 0 1H3a.5.5 0 0 0-.5.5v10a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5V8a.5.5 0 0 1 1 0v5a1.5 1.5 0 0 1-1 1.5z"/>
            <path d="m8.354 10.354 7-7a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0"/>
        </svg>
        <span>Gestor de Tareas</span> </a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white small d-none d-sm-inline"> Hola,<strong class="text-white" th:text="${usuarioAutenticado}"></strong>
            </span> <a th:href="@{/dashboard/logout}" class="btn btn-light btn-sm border-secondary small text-secondary">Salir</a>
        </div>
    </div>
</nav>
<main class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="mb-4"><a th:href="@{/dashboard}"
                                 class="text-decoration-none small d-inline-flex align-items-center text-muted gap-1 fw-medium">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                     class="bi bi-arrow-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                          d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
                Volver al panel principal </a></div>
            <div class="card card-custom rounded-4 p-4 p-sm-5 shadow-sm">
                <div class="mb-2"><h1 class="h4 fw-bold text-dark mb-1">Nueva tarea</h1>
                    <p class="text-muted small">Registra un nuevo objetivo en tu tablero.</p></div>
                <form th:action="@{/dashboard/guardar}" th:object="${tarea}" method="POST">
                    <div class="mb-3"><label for="titulo" class="form-label text-dark small fw-semibold">Título</label>
                        <input type="text" th:field="*{titulo}" class="form-control form-control-lg fs-6 rounded-3"
                               id="titulo" required maxlength="50">
                        <div class="form-text text-muted small" style="font-size: 0.75rem;">Máximo 50 caracteres.</div>
                    </div>
                    <div class="mb-3"><label for="descripcion" class="form-label text-dark small fw-semibold">Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control rounded-3" id="descripcion" rows="4"
                                  required></textarea></div>
                    <div class="d-flex justify-content-end gap-2 pt-2"><a th:href="@{/dashboard}"
                                                                          class="btn btn-light fw-medium text-secondary border rounded-3 px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-medium px-4 rounded-3 shadow-sm">Guardar
                            objetivo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
