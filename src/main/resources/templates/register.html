<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Crear Cuenta</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
        }
        .full-height {
            min-height: 100vh;
        }
        /* Degradado ligeramente distinto para la pantalla de registro */
        .welcome-section {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
        }
    </style>
</head>
<body>

<div class="container-fluid m-0 p-0">
    <div class="row g-0 full-height">

        <!-- SECCIÓN IZQUIERDA: PRESENTACIÓN -->
        <div class="col-lg-7 d-none d-lg-flex flex-column justify-content-center align-items-center text-white welcome-section p-5">
            <div class="text-center" style="max-width: 550px;">
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-person-plus text-info" viewBox="0 0 16 16">
                        <path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H1s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C9.516 10.68 8.289 10 6 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                        <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5"/>
                    </svg>
                </div>
                <h1 class="display-4 fw-bold mb-3">Comienza a organizar tu día</h1>
                <p class="lead text-light-50">Únete a nuestra comunidad, establece tus metas diarias y haz un seguimiento en tiempo real de tu productividad.</p>
            </div>
        </div>

        <!-- SECCIÓN DERECHA: FORMULARIO DE REGISTRO -->
        <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center bg-light p-4 p-md-5">
            <div class="w-100" style="max-width: 450px;">

                <!-- Encabezado visible en móviles -->
                <div class="text-center d-lg-none mb-4">
                    <h2 class="fw-bold text-primary">Gestor de Tareas</h2>
                    <p class="text-muted">Crea tu cuenta gratis</p>
                </div>

                <div class="card border-0 shadow-sm p-4 rounded-3 bg-white">
                    <div class="mb-4">
                        <h3 class="fw-bold text-dark mb-1">Crear Cuenta</h3>
                        <p class="text-muted small">Completa los campos para registrarte en la plataforma.</p>
                    </div>

                    <!-- Formulario preparado para Thymeleaf (ej. th:action="@{/registro}" th:object="${usuarioDto}") -->
                    <form method="POST">

                        <!-- Input: Nombre Completo -->
                        <div class="mb-3">
                            <label width="100%" for="nombre" class="form-label text-secondary small fw-semibold">Nombre completo</label>
                            <input type="text" class="form-control fs-6" id="nombre" name="nombre" required>
                        </div>

                        <!-- Input: Correo Electrónico -->
                        <div class="mb-3">
                            <label for="email" class="form-label text-secondary small fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control fs-6" id="email" name="email" required>
                        </div>

                        <!-- Input: Contraseña -->
                        <div class="mb-3">
                            <label for="password" class="form-label text-secondary small fw-semibold">Contraseña</label>
                            <input type="password" class="form-control fs-6" id="password" name="password" required>
                        </div>

                        <!-- Input: Confirmar Contraseña -->
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label text-secondary small fw-semibold">Confirmar contraseña</label>
                            <input type="password" class="form-control fs-6" id="confirmPassword" name="confirmPassword" required>
                        </div>

                        <!-- Checkbox: Términos y Condiciones -->
                        <div class="form-check mb-4 text-start">
                            <input class="form-check-input" type="checkbox" id="terminos" required>
                            <label class="form-check-label text-muted small" for="terminos">
                                Acepto los <a th:href="@{/terminos}" class="text-decoration-none">Términos de Servicio</a> y la <a th:href="@{/privacidad}" class="text-decoration-none">Política de Privacidad</a>.
                            </label>
                        </div>

                        <!-- Botón de Registro -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 fs-6 fw-semibold shadow-sm mb-3">
                            Registrarse
                        </button>

                        <!-- Enlace al Login -->
                        <div class="text-center">
                            <span class="text-muted small">¿Ya tienes una cuenta? </span>
                            <a th:href="@{/}" class="text-decoration-none small fw-semibold">Inicia sesión aquí</a>
                        </div>

                    </form>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap 5 JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
