<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Nueva Tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body {
        background-color: #fcfcfd;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .navbar-custom {
        background: #111827; /* Gris oscuro minimalista */
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .card-custom {
        border: 1px solid #e5e7eb;
        background-color: #ffffff;
    }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
    <div class="container"><a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
             class="bi bi-check2-square text-primary" viewBox="0 0 16 16">
            <path d="M3 14.5A1.5 1.5 0 0 1 1.5 13V3A1.5 1.5 0 0 1 3 1.5h8a.5.5 0 0 1 0 1H3a.5.5 0 0 0-.5.5v10a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5V8a.5.5 0 0 1 1 0v5a1.5 1.5 0 0 1-1 1.5z"/>
            <path d="m8.354 10.354 7-7a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0"/>
        </svg>
        <span>Gestor de Tareas</span> </a>
        <div class="d-flex align-items-center gap-3"><span class="text-white small d-none d-sm-inline"> Hola, <strong
                class="text-white" th:text="${usuarioAutenticado}"></strong> </span> <a th:href="@{/dashboard/logout}"
                                                                                        class="btn btn-light btn-sm border-secondary small text-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container">

    <!-- Dashboard sin tareas -->
    <section th:if="${#lists.isEmpty(tareas)}">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="card card-custom rounded-4 p-5 shadow-sm text-center">

                    <div class="mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             width="80"
                             height="80"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2"
                             stroke-linecap="round"
                             stroke-linejoin="round"
                             class="icon icon-tabler icons-tabler-outline icon-tabler-list-check">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M3.5 5.5l1.5 1.5l2.5 -2.5"/>
                            <path d="M3.5 11.5l1.5 1.5l2.5 -2.5"/>
                            <path d="M3.5 17.5l1.5 1.5l2.5 -2.5"/>
                            <path d="M11 6l9 0"/>
                            <path d="M11 12l9 0"/>
                            <path d="M11 18l9 0"/>
                        </svg>
                    </div>

                    <h1 class="h3 fw-bold mb-3">
                        No tienes tareas registradas
                    </h1>

                    <p class="text-muted mb-4">
                        Comienza creando tu primera tarea y organiza tus actividades.
                    </p>

                    <div>
                        <a th:href="@{/dashboard/new_task}"
                           class="btn btn-primary btn-lg">
                            Crear primera tarea
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <!-- Dashboard con tareas -->
    <section th:unless="${#lists.isEmpty(tareas)}">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold mb-0">Mis tareas</h1>

            <a th:href="@{/dashboard/new_task}"
               class="btn btn-primary">
                Nueva tarea
            </a>
        </div>

        <div class="card card-custom shadow-sm rounded-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0">

                    <thead>
                    <tr>
                        <th>Título</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="tarea : ${tareas}">
                        <td th:text="${tarea.titulo}"></td>
                        <td th:text="${tarea.descripcion}"></td>
                        <td>
                            <span class="badge bg-success">
                                Pendiente
                            </span>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary">
                                Editar
                            </button>

                            <button class="btn btn-sm btn-outline-danger">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>
        </div>

    </section>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
